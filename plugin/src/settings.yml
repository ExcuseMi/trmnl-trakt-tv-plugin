---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
polling_url: "{% assign _p1 = trmnl.plugin_settings.custom_fields_values.priority_1 | default: \"continue_watching\" %}\r\n{% assign _p2 = trmnl.plugin_settings.custom_fields_values.priority_2 | default: \"recently_watched\" %}\r\n{% assign _p3 = trmnl.plugin_settings.custom_fields_values.priority_3 | default: \"upcoming\" %}\r\n{% assign _p4 = trmnl.plugin_settings.custom_fields_values.priority_4 | default: \"recommended\" %}\r\n{% assign _p5 = trmnl.plugin_settings.custom_fields_values.priority_5 | default: \"none\" %}\r\n{% assign _cats = _p1 | append: \",\" | append: _p2 | append: \",\" | append: _p3 | append: \",\" | append: _p4 | append: \",\" | append: _p5 | split: \",\" %}\r\n{% assign _seen = \"\" %}{% assign _unique = \"\" %}\r\n{% for _cat in _cats %}{% unless _seen contains _cat or _cat == \"none\" %}{% if _unique != \"\" %}{% assign _unique = _unique | append: \",\" %}{% endif %}{% assign _unique = _unique | append: _cat %}{% assign _seen = _seen | append: _cat | append: \",\" %}{% endunless %}{% endfor %}\r\nhttps://trmnl.bettens.dev/trakttv/query?categories={{ _unique }}\r\n"
polling_headers: Authorization=Bearer%20{{ oauth_access_token }}&trakt-api-key={{ oauth_client_id }}
polling_body: ''
id: 245666
custom_fields:
- keyname: author_bio
  field_type: author_bio
  name: About This Plugin
  description: |
    Track your Trakt.tv activity right on your TRMNL device.<br /><br />
    <strong>Available categories</strong><br />
    · <strong>Now Watching</strong> — currently playing<br />
    · <strong>Continue Watching / Paused</strong> — paused shows &amp; movies<br />
    · <strong>Recently Watched</strong> — your watch history<br />
    · <strong>Upcoming</strong> — next episodes &amp; releases<br />
    · <strong>Recommended</strong> — personalized picks from Trakt<br />
    · <strong>Watchlist</strong> — your saved items<br />
    · <strong>Collection</strong> — your collected media<br /><br />
    <strong>Requires Trakt.tv OAuth</strong>
  category: entertainment
  github_url: https://github.com/ExcuseMi/trmnl-trakt-tv-plugin
  learn_more_url: https://trakt.tv/
  help_text: TRMNL X Ready
- keyname: priority_1
  field_type: select
  name: 1st Category
  description: Category shown in the first position.
  options:
  - Now Watching: watching
  - Continue Watching / Paused: continue_watching
  - Recently Watched: recently_watched
  - Upcoming: upcoming
  - Recommended: recommended
  - Watchlist: watchlist
  - Collection: collection
  - None: none
  default: continue_watching
- keyname: priority_2
  field_type: select
  name: 2nd Category
  description: Category shown in the second position.
  options:
  - Now Watching: watching
  - Continue Watching / Paused: continue_watching
  - Recently Watched: recently_watched
  - Upcoming: upcoming
  - Recommended: recommended
  - Watchlist: watchlist
  - Collection: collection
  - None: none
  default: recently_watched
- keyname: priority_3
  field_type: select
  name: 3rd Category
  description: Category shown in the third position.
  options:
  - Now Watching: watching
  - Continue Watching / Paused: continue_watching
  - Recently Watched: recently_watched
  - Upcoming: upcoming
  - Recommended: recommended
  - Watchlist: watchlist
  - Collection: collection
  - None: none
  default: upcoming
- keyname: priority_4
  field_type: select
  name: 4th Category
  description: Category shown in the fourth position.
  options:
  - Now Watching: watching
  - Continue Watching / Paused: continue_watching
  - Recently Watched: recently_watched
  - Upcoming: upcoming
  - Recommended: recommended
  - Watchlist: watchlist
  - Collection: collection
  - None: none
  default: recommended
- keyname: priority_5
  field_type: select
  name: 5th Category
  description: Category shown in the fifth position.
  options:
  - Now Watching: watching
  - Continue Watching / Paused: continue_watching
  - Recently Watched: recently_watched
  - Upcoming: upcoming
  - Recommended: recommended
  - Watchlist: watchlist
  - Collection: collection
  - None: none
  default: none
  optional: true
- keyname: show_images
  field_type: boolean
  name: Show Images
  description: Display poster art alongside each item.
  default: true
  optional: true
name: Trakt.tv
refresh_interval: 30
