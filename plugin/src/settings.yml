---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
polling_url: "  {% assign today_ts = trmnl.system.timestamp_utc | plus: trmnl.user.utc_offset %}                                                                                                                                        \r\n  {% assign today = today_ts | date: \"%Y-%m-%d\" %}                                                                                                                                                                        \r\n  {% assign _p1 = trmnl.plugin_settings.custom_fields_values.priority_1 | default: \"continue_watching\" %}                                                                                                                 \r\n  {% assign _p2 = trmnl.plugin_settings.custom_fields_values.priority_2 | default: \"recently_watched\" %}                                                                                                                  \r\n  {% assign _p3 = trmnl.plugin_settings.custom_fields_values.priority_3 | default: \"upcoming\" %}                                                                                                                        \r\n  {% assign _p4 = trmnl.plugin_settings.custom_fields_values.priority_4 | default: \"recommended\" %}\r\n  {% assign _cats = _p1 | append: \",\" | append: _p2 | append: \",\" | append: _p3 | append: \",\" | append: _p4 | split: \",\" %}\r\n  {% assign _seen = \"\" %}\r\n  {% for _cat in _cats %}{% unless _seen contains _cat %}{% assign _seen = _seen | append: _cat | append: \",\" %}{% if _cat == \"continue_watching\" %}\r\n  https://api.trakt.tv/sync/playback/episodes?extended=full\r\n  https://api.trakt.tv/sync/playback/movies?extended=full{% elsif _cat == \"recently_watched\" %}\r\n  https://api.trakt.tv/sync/history/episodes?page=1&limit=10&extended=full\r\n  https://api.trakt.tv/sync/history/movies?page=1&limit=10&extended=full{% elsif _cat == \"upcoming\" %}\r\n  https://api.trakt.tv/calendars/my/shows/{{ today }}/7?extended=full\r\n  https://api.trakt.tv/calendars/my/movies/{{ today }}/30?extended=full{% elsif _cat == \"recommended\" %}\r\n  https://api.trakt.tv/recommendations/shows?limit=10&extended=full\r\n  https://api.trakt.tv/recommendations/movies?limit=10&extended=full{% elsif _cat == \"watchlist\" %}\r\n  https://api.trakt.tv/users/me/watchlist/shows?extended=full\r\n  https://api.trakt.tv/users/me/watchlist/movies?extended=full{% elsif _cat == \"collection\" %}\r\n  https://api.trakt.tv/users/me/collection/shows?extended=full\r\n  https://api.trakt.tv/users/me/collection/movies?extended=full{% endif %}{% endunless %}{% endfor %}\r\n"
polling_headers: Authorization=Bearer%20{{ oauth_access_token }}&Content-Type=application/json&trakt-api-version=2&trakt-api-key={{ oauth_client_id }}
polling_body: ''
id: 245666
custom_fields:
- keyname: author_bio
  field_type: author_bio
  name: About This Plugin
  description: |
    Track your Trakt.tv activity right on your TRMNL device. Choose up to 4 categories from: Continue Watching, Recently Watched, Upcoming, Picks, Watchlist, and Collection — in any order you like.<br /><br />
    <strong>Requires Trakt.tv OAuth</strong>
  category: entertainment
  github_url: https://github.com/ExcuseMi/trmnl-trakt-tv-plugin
  learn_more_url: https://trakt.tv/
  help_text: TRMNL X Ready
- keyname: priority_1
  field_type: select
  name: 1st Category
  description: Category shown in the first position.
  options:
  - Continue Watching: continue_watching
  - Recently Watched: recently_watched
  - Upcoming: upcoming
  - Picks: recommended
  - Watchlist: watchlist
  - Collection: collection
  - None: none
  default: continue_watching
- keyname: priority_2
  field_type: select
  name: 2nd Category
  description: Category shown in the second position.
  options:
  - Continue Watching: continue_watching
  - Recently Watched: recently_watched
  - Upcoming: upcoming
  - Picks: recommended
  - Watchlist: watchlist
  - Collection: collection
  - None: none
  default: recently_watched
- keyname: priority_3
  field_type: select
  name: 3rd Category
  description: Category shown in the third position.
  options:
  - Continue Watching: continue_watching
  - Recently Watched: recently_watched
  - Upcoming: upcoming
  - Picks: recommended
  - Watchlist: watchlist
  - Collection: collection
  - None: none
  default: upcoming
- keyname: priority_4
  field_type: select
  name: 4th Category
  description: Category shown in the fourth position.
  options:
  - Continue Watching: continue_watching
  - Recently Watched: recently_watched
  - Upcoming: upcoming
  - Picks: recommended
  - Watchlist: watchlist
  - Collection: collection
  - None: none
  default: recommended
- keyname: show_images
  field_type: boolean
  name: Show Images
  description: Display poster art alongside each item.
  default: true
  optional: true
name: Trakt.tv
refresh_interval: 30
