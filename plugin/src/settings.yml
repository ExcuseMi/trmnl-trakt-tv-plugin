---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
polling_url: "{% assign today_ts = trmnl.system.timestamp_utc | plus: trmnl.user.utc_offset %}\r\n{% assign today = today_ts | date: \"%Y-%m-%d\" %}\r\nhttps://api.trakt.tv/sync/playback/episodes?extended=full\r\nhttps://api.trakt.tv/sync/playback/movies?extended=full\r\nhttps://api.trakt.tv/sync/history/episodes?page=1&limit=10&extended=full\r\nhttps://api.trakt.tv/sync/history/movies?page=1&limit=10&extended=full\r\nhttps://api.trakt.tv/calendars/my/shows/{{today}}/7?extended=full\r\nhttps://api.trakt.tv/calendars/my/movies/{{today}}/30?extended=full\r\nhttps://api.trakt.tv/recommendations/shows?limit=10&extended=full\r\nhttps://api.trakt.tv/recommendations/movies?limit=10&extended=full"
polling_headers: Authorization=Bearer%20{{ oauth_access_token }}&Content-Type=application/json&trakt-api-version=2&trakt-api-key=15f86bdc5ed8f3d2ea229efc956d6fda8e291a0f5df637f68e55b4c4b65b99e7
polling_body: ''
id: 245666
custom_fields:
- keyname: author_bio
  field_type: author_bio
  name: About This Plugin
  description: |
    Track your Trakt.tv activity — shows in progress, recent watches, upcoming episodes and movies, and personalised recommendations — right on your TRMNL device.<br /><br />
    <strong>Requires Trakt.tv OAuth</strong>
  category: entertainment
  github_url: https://github.com/ExcuseMi/trmnl-trakt-tv-plugin
  learn_more_url: https://trakt.tv/
  help_text: TRMNL X Ready
- keyname: priority_1
  field_type: select
  name: 1st Category
  description: Category shown in the first position.
  options:
  - Continue Watching: continue_watching
  - Recently Watched: recently_watched
  - Upcoming: upcoming
  - Picks: recommended
  default: continue_watching
- keyname: priority_2
  field_type: select
  name: 2nd Category
  description: Category shown in the second position.
  options:
  - Continue Watching: continue_watching
  - Recently Watched: recently_watched
  - Upcoming: upcoming
  - Picks: recommended
  default: recently_watched
- keyname: priority_3
  field_type: select
  name: 3rd Category
  description: Category shown in the third position.
  options:
  - Continue Watching: continue_watching
  - Recently Watched: recently_watched
  - Upcoming: upcoming
  - Picks: recommended
  default: upcoming
- keyname: priority_4
  field_type: select
  name: 4th Category
  description: Category shown in the fourth position.
  options:
  - Continue Watching: continue_watching
  - Recently Watched: recently_watched
  - Upcoming: upcoming
  - Picks: recommended
  default: recommended
- keyname: show_images
  field_type: boolean
  name: Show Images
  description: Display poster art alongside each item.
  default: true
  optional: true
name: Trakt.tv
refresh_interval: 30
